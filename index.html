    <script>
        let slides = 
        document.querySelectorAll(".bg img, .bg video")
        let i = 0
        function changeSlides(){
            let current = slides[i];
            i = (i + 1) % slides.length;
            let next = slides[i];

            next.classList.add("active");

            if (next.tagName === "video") {
                next.play();
            }

            setTimeout(() => {
               current.classList.remove("active");
               if ( current.tagName === "video") {
                next.play();
               }
               setTimeout(() => {
                current.classList.remove("active");
                      if ( current.tagName === "video"){
                        current.pause();
                        current.currentTime = 0;
                      }
               },500)
        })
        }
        setInterval(changeSlides, 2500);
    </script>
